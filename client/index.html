<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Ball Standing!</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body style="display: none;">
    <div class="view" id="home">
        <input type="text" id="username" placeholder="Enter your name">
        <div class="customization">
            <div class="arrows">
                <button class="arrow" id="color-left">‹</button>
                <div class="ball-preview" id="ball-preview"></div>
                <button class="arrow" id="color-right">›</button>
            </div>
        </div>
        <button id="join-room">Play!</button>
        <button id="create-room">Create room</button>
    </div>
    <div class="view" id="rooms">
        <h1>Rooms</h1>
        <ul id="rooms-list"></ul>
    </div>
    <div class="view" id="lobby">
        <main>
            <ul id="players-list"></ul>
        </main>
    </div>
    <div class="view" id="game">
        <div id="win-screen" style="display:none">
            <h1 id="win-text"></h1>
        </div>
        <canvas id="game" width="2000" height="1000"></canvas>
    </div>
    <script src="./scripts/main.js" type="module"></script>
    <script src="./scripts/socket.js" type="module"></script>
    <script src="./scripts/state.js" type="module"></script>
    <script src="./scripts//views/game.js" type="module"></script>
    <script src="./scripts//views/home.js" type="module"></script>
    <script src="./scripts//views/lobby.js" type="module"></script>
    <script src="./scripts//views/rooms.js" type="module"></script>
</body>

</html>
