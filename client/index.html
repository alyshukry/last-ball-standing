<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Ball Standing!</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <main class="view hidden" id="home">
        <div id="banner">
            <img src="./assets/banner.gif" alt="Last ball standing banner" id="image">
            <div id="balls-container"></div>
        </div>
        <div id="setup-panel">
            <input type="text" id="username" placeholder="Enter your name">
            <div id="avatar-customization">
                <div class="arrows">
                    <button class="arrow left eyes">‹</button>
                    <button class="arrow left mouth">‹</button>
                    <button class="arrow left color">‹</button>
                </div>
                <div class="ball-preview" id="ball-preview"></div>
                <div class="arrows">
                    <button class="arrow right eyes">›</button>
                    <button class="arrow right mouth">›</button>
                    <button class="arrow right color">›</button>
                </div>
                <button id="random">
                    <img src="./assets/die.gif" alt="A die" id="die">
                </button>
            </div>
            <div id="join-buttons">
                <button id="join-room">Play!</button>
                <button id="create-room">Create room</button>
            </div>
        </div>
    </main>
    <main class="view hidden" id="rooms">
        <div id="rooms-panel">
            <h1>Rooms</h1>
            <ul id="rooms-list"></ul>
        </div>
    </main>
    <main class="view hidden" id="lobby">
        <ul id="players-list"></ul>
        <p id="start-game-countdown">waiting for owner to start</p>
        <button id="start-game" class="hidden">Start game</button>
    </main>
    <main class="view hidden" id="game">
        <div id="win-screen" class="hidden">
            <div id="winner-avatar"></div>
            <h1></h1>
            <ul id="player-wins"></ul>
            <button id="return-to-lobby" class="hidden">Return everyone to lobby</button>
        </div>
        <canvas id="game-canvas" width="1500" height="750"></canvas>
    </main>

    <script src="./scripts/state.js" type="module"></script>
    <script src="./scripts/main.js" type="module"></script>
    <script src="./scripts/socket.js" type="module"></script>
    <script src="./scripts/views/game.js" type="module"></script>
    <script src="./scripts/views/home.js" type="module"></script>
    <script src="./scripts/views/lobby.js" type="module"></script>
    <script src="./scripts/views/rooms.js" type="module"></script>
</body>

</html>
